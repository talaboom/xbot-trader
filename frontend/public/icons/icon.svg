<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="xgrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="#000000"/>

  <!-- Outlined X: gradient stroke with black inner stroke creates the double-line look -->
  <g stroke-linecap="square" fill="none">
    <!-- Top-left → bottom-right -->
    <line x1="140" y1="140" x2="372" y2="372" stroke="url(#xgrad)" stroke-width="58"/>
    <line x1="148" y1="148" x2="364" y2="364" stroke="#000000" stroke-width="34"/>
    <!-- Bottom-left → top-right (extends to arrowhead) -->
    <line x1="140" y1="372" x2="395" y2="117" stroke="url(#xgrad)" stroke-width="58"/>
    <line x1="148" y1="364" x2="387" y2="125" stroke="#000000" stroke-width="34"/>
  </g>

  <!-- Filled triangular arrowhead pointing NE, attached to the upper-right end of the stripe -->
  <path d="M 452 60 L 376 92 L 420 136 Z" fill="url(#xgrad)"/>
</svg>
